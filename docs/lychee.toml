# Lychee Link Checker Configuration
# https://github.com/lycheeverse/lychee

# Cache results
cache = true
max_cache_age = "1d"

# Exclude paths
exclude_path = [
  ".git",
  ".github",
  "node_modules"
]

# Retry and timeout settings
max_retries = 3
timeout = 20

# Concurrency
max_concurrency = 8

# Accept 429 (rate limited) as valid since we retry
accept = ["200..=299", "429"]

# Verbose output
verbose = "info"

# Don't require HTTPS
require_https = false

# Index files
index_files = ["index.html"]
